name: Setup Unity
description: |
  유니티 파일 셋업 및 캐싱.
runs:
  using: composite  # composite action (모듈화된 액션) 임을 명시
  steps:
    # 1. git LFS로 관리되는 파일 목록을 긴 형식(-l)으로 출력
    # 2. 출력된 내용의 각 행을 공백으로 나눈(-d' ') 뒤 첫 번째 필드를 선택.
    #    -> LFS 로 관리되는 파일 객체의 full Object ID가 선택됨.
    # 3. OID를 사전순으로 정렬한 뒤 .lfs-assets-id 파일에 저장.
    #    -> 정렬로 정규화해야 차후 캐시 hit에 유리함.
    - name: Create LFS file list
      shell: bash
      run: git lfs ls-file -l | cut -d' ' -f1 | sort > .lfs-assets-id
      
    # 러너의 로컬 레포지터리에 캐시된 lfs 파일 저장
    - name: Restore LFS cache
      uses: actions/cache@v5
      with:
        path: .git/lfs
        key: lfs-${{ hashFiles('.lfs-assets-id') }}
    
    # git lfs pull - lfs fetch 및 checkout 수행
    # 1. git lfs fetch - LFS 서버에서 파일들을 .git/lfs/ 디렉터리에 다운로드
    #    -> 캐시로부터 이미 다운받은 파일은 다운로드를 건너뜀.
    # 2. git lfs checkout - .git/lfs/ 에 있는 바이너리를 작업 트리로 복사해 포인터 파일을 실제 파일로 교체.
    #    -> lfs 파일을 리포지터리에 받아오기 전에 체크아웃하면, 실제 바이너리 파일 대신 포인터 파일이 작업 트리에 저장됨.
    - name: Git LFS pull
      shell: bash
      run: git lfs pull
    
    # Unity는 원본 에셋을 Unity에서 사용할 수 있는 형태로 변환하여 Library 폴더에 저장한다.
    # Library 폴더는 보통 .gitignore에 추가된다.
    # Library 가 없다면 Unity가 에셋을 다시 import해야 하는데, 오래 걸릴 수 있으므로 캐시하는 것이 좋다.
    - name: Restore Unity Library cache
      uses: actions/cache@v5
      with:
        path: Library
        key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
        # 완전 일치 캐시가 없으면, Library-로 시작하는 캐시 중 가장 최근 것을 가져오도록 시도.
        # 오래된 Library라도 있는 것이 빈 Library에서 시작하는 것보다 빠름
        restore-keys: |
          Library-